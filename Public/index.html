<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../src/styles/styles.css">
    <title>Login Page</title>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="header">
                <h1>Bussing</h1>
                <button>Admin?</button>
            </div>
            <p>Doesn't have an account yet? <a href="#">Sign Up</a></p>
            <form action="" method="post">
                <label for="email">Username</label>
                <input type="email" id="email" placeholder="Enter username" required>
                
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter 6 characters or more" required>

                <button type="submit" class="login-btn">LOGIN</button>

                <a href="#" class="forgot-password">Forgot Password?</a>

            </form>

            <hr>
            <p class="or">or login with</p>
            <div class="social-buttons">
                <button class="google-btn" id="google-login-btn">Google</button>
                <button class="facebook-btn">Facebook</button>
            </div>

            <!-- <div class="admin">
                <button>Continue as Admin?</button>
            </div> -->
        </div>
        <div class="illustration">
            <img src="../src/assets/img/bus_illustration.jpg" alt="Login Illustration">
        </div>
    </div>

    <script type="module" src="../src/index.js"></script>
</body>
</html>
