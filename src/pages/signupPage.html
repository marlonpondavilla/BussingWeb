<!-- HTML -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Form</title>
    <link rel="stylesheet" href="../styles/signupPage.css">
</head>
<body>
    <div class="signup-form-container">
        <form class="signup-form">
            <h1>Sign up <span>to Bussing</span></h1>

            <label for="first-name" class="input-label">First Name</label>
            <input type="text" id="first-name" name="first-name" placeholder="Your Name" required>

            <label for="last-name" class="input-label">Last Name</label>
            <input type="text" id="last-name" name="last-name" placeholder="Your last name" required>

            <label for="email" class="input-label">Email</label>
            <input type="email" id="email" name="email" placeholder="Your email" required>

            <label for="password" class="input-label">Password</label>
            <input type="password" id="password" name="password" placeholder="********" required>

            <div class="checkbox-group">
                <input type="checkbox" id="marketing" name="marketing">
                <label for="marketing">I would like to receive marketing emails.</label>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I agree to the <a href="#">terms and conditions</a>.</label>
            </div>

            <button type="submit">Sign up</button>

            <p><a href="../../index.html">Log in to your account</a></p>
        </form>
    </div>
</body>
</html>
